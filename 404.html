<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - OneTree Pakistan</title>
<meta name="description" content="The page you are looking for could not be found.">
<meta name="theme-color" content="#2E7D32">
<meta name="robots" content="noindex,follow">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.notfound-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 80px 32px;
  text-align: center;
}
.notfound-logo {
  width: 84px;
  height: 84px;
  object-fit: contain;
  margin-bottom: 32px;
}
.notfound-code {
  font-family: 'Poppins', sans-serif;
  font-size: 6rem;
  font-weight: 800;
  color: var(--g-primary);
  line-height: 1;
  margin-bottom: 16px;
}
.notfound-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 12px;
}
.notfound-text {
  color: var(--text-muted);
  font-size: 1rem;
  margin-bottom: 32px;
  line-height: 1.6;
}
.notfound-link {
  display: inline-block;
  background: var(--g-primary);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  padding: 14px 36px;
  border-radius: 50px;
  text-decoration: none;
}
.notfound-link:hover {
  opacity: 0.9;
}
</style>
</head>
<body>
<div class="notfound-container">
  <a href="/"><img class="notfound-logo" src="images/onetree.png" alt="OneTree Pakistan"></a>
  <div class="notfound-code">404</div>
  <h1 class="notfound-title">Page Not Found</h1>
  <p class="notfound-text">The page you are looking for does not exist or has been moved. If you scanned a QR code and landed here, the link may be outdated.</p>
  <a href="/" class="notfound-link">Back to OneTree</a>
</div>
</body>
</html>
