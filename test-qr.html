<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Test - OneTree Pakistan</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.qr-page {
  max-width: 480px;
  margin: 0 auto;
  padding: 60px 32px;
  text-align: center;
}
.qr-logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
  margin-bottom: 32px;
}
.qr-title {
  font-family: 'Poppins', sans-serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 8px;
}
.qr-subtitle {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 32px;
}
#qrcode {
  display: inline-block;
  padding: 20px;
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  margin-bottom: 24px;
}
.qr-url {
  font-size: 0.78rem;
  color: var(--text-muted);
  word-break: break-all;
  background: #f5f5f5;
  padding: 10px 16px;
  border-radius: 8px;
  margin-bottom: 32px;
}
.qr-note {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="qr-page">
  <a href="/"><img class="qr-logo" src="images/onetree.png" alt="OneTree Pakistan"></a>
  <h1 class="qr-title">QR Flow Test</h1>
  <p class="qr-subtitle">Scan this QR code with Google Lens or your phone camera</p>
  <div id="qrcode"></div>
  <div class="qr-url" id="qr-url-display"></div>
  <p class="qr-note">Scanning will open the tree details page on your phone, confirming the full QR flow works end-to-end.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var TEST_URL = 'https://onetree.pk/public-tree.html?tree_code=ONT-TREE-8b249478-20260326-4171';

document.getElementById('qr-url-display').textContent = TEST_URL;

new QRCode(document.getElementById('qrcode'), {
  text: TEST_URL,
  width: 240,
  height: 240,
  colorDark: '#1b5e20',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
